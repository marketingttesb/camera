<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:black;
font-family:Arial;
}

#cameraContainer{
position:relative;
width:100%;
height:85vh;
overflow:hidden;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

#logo{
position:absolute;
top:10px;
left:10px;
height:40px;
}

#bottomPanel{
position:absolute;
bottom:10px;
left:10px;
right:10px;
display:flex;
gap:10px;
}

#map{
width:25%;
height:120px;
border:0;
}

#info{
width:75%;
background:rgba(0,0,0,0.6);
color:white;
padding:8px;
font-size:13px;
overflow:hidden;
}

#captureBtn{
width:100%;
height:65px;
font-size:20px;
background:#0a84ff;
color:white;
border:none;
}

</style>

</head>

<body>

<div id="cameraContainer">

<video id="video" autoplay playsinline></video>

<img id="logo" src="logo.png">

<div id="bottomPanel">

<iframe id="map"></iframe>

<div id="info">
<div id="time"></div>
<div id="gps"></div>
<div id="addr"></div>
</div>

</div>

</div>

<button id="captureBtn">CAPTURE PHOTO</button>

<canvas id="canvas" style="display:none"></canvas>

<script>

let lat=0;
let lon=0;
let address="";

const video=document.getElementById("video");

navigator.mediaDevices.getUserMedia({
video:{
facingMode:"environment",
width:{ideal:4096},
height:{ideal:2160}
}
}).then(stream=>{
video.srcObject=stream;
});

navigator.geolocation.getCurrentPosition(async pos=>{

lat=pos.coords.latitude;
lon=pos.coords.longitude;

document.getElementById("gps").innerHTML=
lat.toFixed(6)+", "+lon.toFixed(6);

document.getElementById("map").src=
"https://maps.google.com/maps?q="+lat+","+lon+"&z=19&output=embed";

let geo=await fetch(
"https://nominatim.openstreetmap.org/reverse?format=json&lat="+lat+"&lon="+lon
);

let data=await geo.json();

address=data.display_name || "Address not available";

document.getElementById("addr").innerHTML=address;

});

function getTime(){

let now=new Date();

return now.toLocaleDateString()+" "+now.toLocaleTimeString();

}

setInterval(()=>{
document.getElementById("time").innerHTML=getTime();
},1000);

document.getElementById("captureBtn").addEventListener("click",capture);

async function capture(){

let canvas=document.getElementById("canvas");

canvas.width=video.videoWidth;
canvas.height=video.videoHeight;

let ctx=canvas.getContext("2d");

ctx.drawImage(video,0,0);

let logo=document.getElementById("logo");

ctx.drawImage(logo,20,20,logo.naturalWidth/2,logo.naturalHeight/2);

let mapImg=new Image();

mapImg.crossOrigin="anonymous";

mapImg.src=
"https://staticmap.openstreetmap.de/staticmap.php?center="
+lat+","+lon+
"&zoom=19&size=300x300&markers="
+lat+","+lon+",red";

await new Promise(r=>mapImg.onload=r);

let mapSize=canvas.width*0.25;

ctx.drawImage(
mapImg,
20,
canvas.height-mapSize-20,
mapSize,
mapSize
);

let infoX=mapSize+40;
let infoWidth=canvas.width-infoX-20;

ctx.fillStyle="rgba(0,0,0,0.6)";
ctx.fillRect(infoX,canvas.height-mapSize-20,infoWidth,mapSize);

ctx.fillStyle="white";
ctx.font="28px Arial";

ctx.fillText(
getTime(),
infoX+20,
canvas.height-mapSize+40
);

ctx.font="22px Arial";

ctx.fillText(
lat.toFixed(6)+", "+lon.toFixed(6),
infoX+20,
canvas.height-mapSize+80
);

wrapText(
ctx,
address,
infoX+20,
canvas.height-mapSize+120,
infoWidth-40,
28
);

let link=document.createElement("a");

link.download="site_photo.png";
link.href=canvas.toDataURL("image/png");

link.click();

}

function wrapText(ctx,text,x,y,maxWidth,lineHeight){

let words=text.split(" ");
let line="";

for(let n=0;n<words.length;n++){

let testLine=line+words[n]+" ";
let metrics=ctx.measureText(testLine);
let testWidth=metrics.width;

if(testWidth>maxWidth && n>0){

ctx.fillText(line,x,y);
line=words[n]+" ";
y+=lineHeight;

}else{
line=testLine;
}

}

ctx.fillText(line,x,y);

}

</script>

</body>
</html>
