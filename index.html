<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:black;
font-family:Arial;
}

#camera{
position:relative;
width:100%;
height:85vh;
overflow:hidden;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

#logo{
position:absolute;
top:0;
left:0;
width:8vw;
max-width:120px;
}

#bottom{
position:absolute;
bottom:0;
left:0;
right:0;
display:flex;
}

#map{
width:25%;
height:110px;
border:0;
}

#info{
width:75%;
background:rgba(0,0,0,0.6);
color:white;
font-size:13px;
padding:6px;
}

#capture{
width:100%;
height:65px;
font-size:20px;
background:#007aff;
color:white;
border:none;
}

</style>

</head>

<body>

<div id="camera">

<video id="video" autoplay playsinline></video>

<img id="logo" src="logo.png">

<div id="bottom">

<iframe id="map"></iframe>

<div id="info">
<div id="time"></div>
<div id="gps"></div>
<div id="addr"></div>
</div>

</div>

</div>

<button id="capture" type="button">CAPTURE PHOTO</button>

<canvas id="canvas" style="display:none"></canvas>

<script>

let lat=0;
let lon=0;
let address="";

const video=document.getElementById("video");

navigator.mediaDevices.getUserMedia({
video:{
facingMode:"environment",
width:{ideal:4096},
height:{ideal:2160}
}
}).then(stream=>{
video.srcObject=stream;
});

navigator.geolocation.getCurrentPosition(async pos=>{

lat=pos.coords.latitude;
lon=pos.coords.longitude;

document.getElementById("gps").innerHTML=
lat.toFixed(6)+" , "+lon.toFixed(6);

document.getElementById("map").src=
"https://maps.google.com/maps?q="+lat+","+lon+"&z=19&output=embed";

let r=await fetch(
"https://nominatim.openstreetmap.org/reverse?format=json&lat="+lat+"&lon="+lon
);

let d=await r.json();

address=d.display_name || "";

document.getElementById("addr").innerHTML=address;

});

function getTime(){

let n=new Date();

return n.toLocaleDateString()+" "+n.toLocaleTimeString();

}

setInterval(()=>{
document.getElementById("time").innerHTML=getTime();
},1000);

document.getElementById("capture").addEventListener("click",capture);

async function capture(){

let canvas=document.getElementById("canvas");

canvas.width=video.videoWidth;
canvas.height=video.videoHeight;

let ctx=canvas.getContext("2d");

ctx.drawImage(video,0,0);

let logo=document.getElementById("logo");

let logoW=canvas.width*0.08;
let logoH=logoW*(logo.naturalHeight/logo.naturalWidth);

ctx.drawImage(logo,0,0,logoW,logoH);

let mapImg=new Image();

mapImg.crossOrigin="anonymous";

mapImg.src=
"https://staticmap.openstreetmap.de/staticmap.php?center="
+lat+","+lon+
"&zoom=19&size=400x400&markers="
+lat+","+lon+",red";

await new Promise(r=>mapImg.onload=r);

let mapSize=canvas.width*0.25;

ctx.drawImage(
mapImg,
0,
canvas.height-mapSize,
mapSize,
mapSize
);

let infoX=mapSize;
let infoW=canvas.width-mapSize;

ctx.fillStyle="rgba(0,0,0,0.6)";
ctx.fillRect(infoX,canvas.height-mapSize,infoW,mapSize);

ctx.fillStyle="white";

ctx.font="28px Arial";
ctx.fillText(getTime(),infoX+20,canvas.height-mapSize+40);

ctx.font="22px Arial";
ctx.fillText(lat.toFixed(6)+" , "+lon.toFixed(6),infoX+20,canvas.height-mapSize+80);

wrapText(ctx,address,infoX+20,canvas.height-mapSize+120,infoW-40,28);

let link=document.createElement("a");

link.href=canvas.toDataURL("image/png");
link.download="site_photo.png";

link.click();

}

function wrapText(ctx,text,x,y,maxWidth,lineHeight){

let words=text.split(" ");
let line="";

for(let n=0;n<words.length;n++){

let test=line+words[n]+" ";
let w=ctx.measureText(test).width;

if(w>maxWidth && n>0){

ctx.fillText(line,x,y);
line=words[n]+" ";
y+=lineHeight;

}else{
line=test;
}

}

ctx.fillText(line,x,y);

}

</script>

</body>
</html>
