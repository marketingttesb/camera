<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
    margin:0;
    background:black;
    font-family:Arial;
}
#camera{
    position:relative;
    width:100%;
    height:75vh;
    overflow:hidden;
}
video{
    width:100%;
    height:100%;
    object-fit:cover;
}
/* top-left bar: map + logo */
#topbar{
    position:absolute;
    top:0;
    left:0;
    display:flex;
    align-items:flex-start;
    gap:5px;
    pointer-events:none; /* overlay tidak ganggu klik button */
}
#mapPreview{
    height:60px;
    width:60px;
}
#logo{
    height:60px;
}
#info{
    background:rgba(0,0,0,0.7);
    color:white;
    padding:10px;
    font-size:14px;
}
#capture{
    width:90%;
    height:60px;
    font-size:20px;
    background:#007aff;
    color:white;
    border:none;
    display:block;
    margin:15px auto;
    z-index:999;
    position:relative;
}
</style>
</head>
<body>

<div id="camera">
    <video id="video" autoplay playsinline></video>
    <div id="topbar">
        <img id="mapPreview">
        <img id="logo" src="logo.png">
    </div>
</div>

<div id="info">
    <div id="time"></div>
    <div id="gps"></div>
    <div id="addr"></div>
</div>

<button id="capture" type="button">CAPTURE</button>

<canvas id="canvas" style="display:none"></canvas>

<script>
let lat=0, lon=0, address="", mapURL="";
const video=document.getElementById("video");

// Camera
navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
.then(stream=>{video.srcObject=stream;});

// Get location + map + address
navigator.geolocation.getCurrentPosition(async pos=>{
    lat=pos.coords.latitude;
    lon=pos.coords.longitude;
    document.getElementById("gps").innerHTML=lat.toFixed(6)+" , "+lon.toFixed(6);

    mapURL="https://staticmap.openstreetmap.de/staticmap.php?center="
        +lat+","+lon+"&zoom=16&size=300x300&markers="+lat+","+lon+",red";
    document.getElementById("mapPreview").src=mapURL;

    // reverse geocoding full address
    let r=await fetch(
        "https://nominatim.openstreetmap.org/reverse?format=json&lat="+lat+"&lon="+lon
    );
    let d=await r.json();
    if(d.address){
        // concat all relevant fields except house_number
        let a=[];
        ["road","suburb","city","county","state","postcode","country"].forEach(k=>{
            if(d.address[k]) a.push(d.address[k]);
        });
        address=a.join(", ");
    } else address="";
    document.getElementById("addr").innerHTML=address;
});

// Time display
function getTime(){ let n=new Date(); return n.toLocaleDateString()+" "+n.toLocaleTimeString();}
setInterval(()=>{document.getElementById("time").innerHTML=getTime();},1000);

// Capture button
document.getElementById("capture").addEventListener("click",capture);

function capture(){
    let canvas=document.getElementById("canvas");
    canvas.width=video.videoWidth;
    canvas.height=video.videoHeight;
    let ctx=canvas.getContext("2d");
    ctx.drawImage(video,0,0);

    // Map image
    let mapImg=new Image();
    mapImg.crossOrigin="anonymous";
    mapImg.src=mapURL;
    mapImg.onload=function(){
        let mapH=canvas.height*0.08; // same height as logo
        ctx.drawImage(mapImg,0,0,mapH,mapH);

        // Logo beside map
        let logo=document.getElementById("logo");
        ctx.drawImage(logo,mapH+5,0,mapH,mapH);

        // Info panel at bottom
        let infoH=canvas.height*0.20;
        ctx.fillStyle="rgba(0,0,0,0.7)";
        ctx.fillRect(0,canvas.height-infoH,canvas.width,infoH);

        ctx.fillStyle="white";
        ctx.font="28px Arial";
        ctx.fillText(getTime(),20,canvas.height-infoH+40);
        ctx.font="22px Arial";
        ctx.fillText(lat.toFixed(6)+" , "+lon.toFixed(6),20,canvas.height-infoH+80);
        wrapText(ctx,address,20,canvas.height-infoH+120,canvas.width-40,28);

        // download
        let link=document.createElement("a");
        link.href=canvas.toDataURL("image/png");
        link.download="site_photo.png";
        link.click();
    };
}

function wrapText(ctx,text,x,y,maxWidth,lineHeight){
    let words=text.split(" ");
    let line="";
    for(let n=0;n<words.length;n++){
        let test=line+words[n]+" ";
        let w=ctx.measureText(test).width;
        if(w>maxWidth && n>0){
            ctx.fillText(line,x,y);
            line=words[n]+" ";
            y+=lineHeight;
        }else line=test;
    }
    ctx.fillText(line,x,y);
}
</script>

</body>
</html>
