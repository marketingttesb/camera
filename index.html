<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Camera GPS Capture - v1.0.1</title>

<style>
body{
  background:#000;
  color:white;
  text-align:center;
  font-family:Arial;
}

#container{
  position:relative;
  max-width:500px;
  margin:auto;
}

video{
  width:100%;
}

#logo{
  position:absolute;
  top:0;
  left:0;
  width:80px;
  height:80px; /* tetap ukuran */
  margin:0;    /* buang margin */
}

#info{
  position:absolute;
  bottom:10px;
  left:10px;
  right:10px;
  background:rgba(0,0,0,0.6);
  padding:8px;
  font-size:12px;
  text-align:left;
  color:white;
}

button{
  padding:12px 20px;
  font-size:18px;
  margin-top:10px;
}
</style>
</head>

<body>

<div id="container">
  <video id="video" autoplay playsinline></video>
  <img id="logo" src="logo.png">
  <div id="info">
    <div id="time"></div>
    <div id="gps"></div>
    <div id="addr"></div>
  </div>
</div>

<button onclick="capture()">CAPTURE</button>

<canvas id="canvas" style="display:none"></canvas>

<script>
let lat=0, lon=0, address="";
const video=document.getElementById("video");

// Camera
navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
.then(stream=>{video.srcObject=stream;});

// Geolocation + address
navigator.geolocation.getCurrentPosition(async pos=>{
  lat=pos.coords.latitude;
  lon=pos.coords.longitude;

  document.getElementById("gps").innerHTML = lat.toFixed(6)+", "+lon.toFixed(6);

  // Reverse geocode full address
  try{
    let r = await fetch("https://nominatim.openstreetmap.org/reverse?format=json&lat="+lat+"&lon="+lon);
    let d = await r.json();

    if(d.address){
      let a=[];
      // Ambil semua field yang ada untuk full address
      ["house_number","road","suburb","city","county","state","postcode","country"].forEach(k=>{
        if(d.address[k]) a.push(d.address[k]);
      });
      address = a.join(", ");
    } else address="";
    document.getElementById("addr").innerHTML = address;
  }catch(e){
    console.log("Address lookup failed", e);
    document.getElementById("addr").innerHTML="";
  }
});

// Time
function getTime(){ 
  let n=new Date(); 
  return n.toLocaleDateString()+" "+n.toLocaleTimeString();
}
setInterval(()=>{document.getElementById("time").innerHTML = getTime();},1000);

// Capture
function capture(){
  const canvas=document.getElementById("canvas");
  canvas.width=video.videoWidth;
  canvas.height=video.videoHeight;
  const ctx=canvas.getContext("2d");

  // draw video
  ctx.drawImage(video,0,0);

  // draw bottom info
  ctx.fillStyle="rgba(0,0,0,0.6)";
  ctx.fillRect(canvas.width-260,canvas.height-110,250,100);

  ctx.fillStyle="white";
  ctx.font="20px Arial";
  ctx.fillText(getTime(),canvas.width-250,canvas.height-80);

  ctx.font="16px Arial";
  ctx.fillText(lat.toFixed(6)+", "+lon.toFixed(6),canvas.width-250,canvas.height-50);

  ctx.fillText(address,canvas.width-250,canvas.height-20);

  // draw logo
  const logo=document.getElementById("logo");
  ctx.drawImage(logo,0,0,80,80);

  // download
  let link=document.createElement("a");
  link.download="photo.png";
  link.href=canvas.toDataURL("image/png");
  link.click();
}
</script>

</body>
</html>
