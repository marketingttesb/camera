<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Camera GPS Capture</title>

<style>

body{
background:#000;
color:white;
text-align:center;
font-family:Arial;
}

#container{
position:relative;
max-width:500px;
margin:auto;
}

video{
width:100%;
}

#logo{
position:absolute;
top:10px;
left:10px;
width:80px;
}

#map{
position:absolute;
bottom:10px;
left:10px;
width:120px;
height:120px;
}

#info{
position:absolute;
bottom:10px;
right:10px;
background:rgba(0,0,0,0.6);
padding:8px;
font-size:12px;
text-align:right;
}

button{
padding:12px 20px;
font-size:18px;
margin-top:10px;
}

</style>

</head>

<body>

<div id="container">

<video id="video" autoplay playsinline></video>

<img id="logo" src="logo.png">

<iframe id="map"></iframe>

<div id="info">

<div id="time"></div>
<div id="gps"></div>

</div>

</div>

<button onclick="capture()">CAPTURE</button>

<canvas id="canvas" style="display:none"></canvas>

<script>

let lat=0;
let lon=0;

const video = document.getElementById("video");

navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
})
.then(stream=>{
video.srcObject = stream;
});

navigator.geolocation.getCurrentPosition(pos=>{

lat = pos.coords.latitude;
lon = pos.coords.longitude;

document.getElementById("gps").innerHTML =
lat.toFixed(6)+", "+lon.toFixed(6);

document.getElementById("map").src =
"https://maps.google.com/maps?q="+lat+","+lon+"&z=16&output=embed";

});

function getTime(){

let now = new Date();

return now.toLocaleDateString()+" "+now.toLocaleTimeString();

}

setInterval(()=>{
document.getElementById("time").innerHTML = getTime();
},1000);

function capture(){

const canvas = document.getElementById("canvas");

canvas.width = video.videoWidth;
canvas.height = video.videoHeight;

const ctx = canvas.getContext("2d");

ctx.drawImage(video,0,0);

ctx.fillStyle="rgba(0,0,0,0.6)";
ctx.fillRect(canvas.width-260,canvas.height-90,250,80);

ctx.fillStyle="white";
ctx.font="20px Arial";

ctx.fillText(getTime(),canvas.width-250,canvas.height-60);

ctx.font="16px Arial";

ctx.fillText(
lat.toFixed(6)+", "+lon.toFixed(6),
canvas.width-250,
canvas.height-30
);

const logo = document.getElementById("logo");

ctx.drawImage(logo,20,20,120,60);

let link = document.createElement("a");

link.download="photo.png";
link.href = canvas.toDataURL("image/png");

link.click();

}

</script>

</body>
</html>
