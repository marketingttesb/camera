<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:black;
font-family:Arial;
}

#cameraContainer{
position:relative;
width:100%;
height:85vh;
overflow:hidden;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

#logo{
position:absolute;
top:10px;
left:10px;
height:70px;
}

#info{
position:absolute;
bottom:10px;
right:10px;
background:rgba(0,0,0,0.6);
color:white;
padding:10px;
font-size:14px;
max-width:60%;
}

#map{
position:absolute;
bottom:10px;
left:10px;
width:150px;
height:150px;
border:0;
}

#captureBtn{
width:100%;
height:60px;
font-size:20px;
background:#007bff;
color:white;
border:none;
}

</style>

</head>

<body>

<div id="cameraContainer">

<video id="video" autoplay playsinline></video>

<img id="logo" src="logo.png">

<iframe id="map"></iframe>

<div id="info">
<div id="time"></div>
<div id="gps"></div>
<div id="addr"></div>
</div>

</div>

<button id="captureBtn" onclick="capture()">CAPTURE PHOTO</button>

<canvas id="canvas" style="display:none"></canvas>

<script>

let lat=0;
let lon=0;
let address="";

const video=document.getElementById("video");

navigator.mediaDevices.getUserMedia({
video:{
facingMode:"environment",
width:{ideal:4096},
height:{ideal:2160}
}
})
.then(stream=>{
video.srcObject=stream;
});

navigator.geolocation.getCurrentPosition(async pos=>{

lat=pos.coords.latitude;
lon=pos.coords.longitude;

document.getElementById("gps").innerHTML=
lat.toFixed(6)+", "+lon.toFixed(6);

document.getElementById("map").src=
"https://maps.google.com/maps?q="+lat+","+lon+"&z=19&output=embed";

let geo=await fetch(
"https://nominatim.openstreetmap.org/reverse?format=json&lat="+lat+"&lon="+lon
);

let data=await geo.json();

address=data.display_name;

document.getElementById("addr").innerHTML=address;

});

function getTime(){

let now=new Date();

return now.toLocaleDateString()+" "+now.toLocaleTimeString();

}

setInterval(()=>{
document.getElementById("time").innerHTML=getTime();
},1000);

async function capture(){

let canvas=document.getElementById("canvas");

canvas.width=video.videoWidth;
canvas.height=video.videoHeight;

let ctx=canvas.getContext("2d");

ctx.drawImage(video,0,0);

let logo=document.getElementById("logo");

ctx.drawImage(logo,20,20,logo.naturalWidth,logo.naturalHeight);

let mapImg=new Image();

mapImg.crossOrigin="anonymous";

mapImg.src=
"https://staticmap.openstreetmap.de/staticmap.php?center="
+lat+","+lon+
"&zoom=19&size=250x250&markers="
+lat+","+lon+",red";

await new Promise(r=>mapImg.onload=r);

ctx.drawImage(mapImg,20,canvas.height-270,250,250);

ctx.fillStyle="rgba(0,0,0,0.6)";
ctx.fillRect(canvas.width-650,canvas.height-200,630,180);

ctx.fillStyle="white";
ctx.font="28px Arial";

ctx.fillText(getTime(),canvas.width-630,canvas.height-150);

ctx.font="22px Arial";

ctx.fillText(
lat.toFixed(6)+", "+lon.toFixed(6),
canvas.width-630,
canvas.height-110
);

wrapText(ctx,address,canvas.width-630,canvas.height-70,600,26);

let link=document.createElement("a");

link.download="photo.png";
link.href=canvas.toDataURL("image/png");

link.click();

}

function wrapText(ctx,text,x,y,maxWidth,lineHeight){

let words=text.split(" ");
let line="";

for(let n=0;n<words.length;n++){

let testLine=line+words[n]+" ";
let metrics=ctx.measureText(testLine);
let testWidth=metrics.width;

if(testWidth>maxWidth && n>0){

ctx.fillText(line,x,y);
line=words[n]+" ";
y+=lineHeight;

}
else{
line=testLine;
}

}

ctx.fillText(line,x,y);

}

</script>

</body>
</html>
